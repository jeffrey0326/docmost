name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.71.1)'
        required: true

permissions:
  contents: write

env:
  VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 不需要私有子模块，直接使用默认 GITHUB_TOKEN 拉取主线代码
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Strip v prefix
        id: strip-v
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build and Export Docker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: |
            docmost/docmost:latest
            docmost/docmost:${{ steps.strip-v.outputs.version }}
          outputs: type=docker,dest=docmost-amd64.docker.tar
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max

      - name: Compress image
        run: gzip docmost-amd64.docker.tar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: docmost-amd64.docker.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
